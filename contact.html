<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="images/icon_y_2.png">
    <title>Contact | Portfolio</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <header class="header">
        <div class="container">
            <!-- logo -->
            <h1 class="header__logo">
                <a href="index.html">
                    <img src="images/icon_y_2.png" alt="Logo" class="header__logo-img">
                    <span class="header__logo-text">Portfolio</span>
                </a>
            </h1>

            <button class="header__hamburger" id="js-hamburger" aria-label="メニュー開閉">
                <span></span>
                <span></span>
                <span></span>
            </button>

            <!-- nav -->
            <nav class="header__nav" id="js-nav">
                <ul class="header__list">
                    <li><a href="index.html" class="header__link">Home</a></li>
                    <li><a href="index.html#gallery" class="header__link">Gallery</a></li>
                    <li><a href="index.html#profile" class="header__link">Profile</a></li>
                    <li><a href="#" class="header__link">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section class="contact section is-show">
            <div class="container">
                <h2 class="section__title">Contact</h2>

                <form action="#" method="post" class="contact__form" id="contact-form">
                    <p class="contact__message">
                        本ポートフォリオに関するお問い合わせは、以下のフォームよりご連絡ください。
                    </p>
                    <div class="contact__item">
                        <label for="name" class="contact__label">Name</label>
                        <input type="text" id="name" name="name" class="contact__input" placeholder="お名前" required>
                    </div>
                    <div class="contact__item">
                        <label for="email" class="contact__label">Email</label>
                        <input type="email" id="email" name="email" class="contact__input" placeholder="メールアドレス" required>
                    </div>
                    <div class="contact__item">
                        <label for="message" class="contact__label">Message</label>
                        <textarea id="message" name="message" class="contact__textarea" placeholder="お問い合わせ内容" required></textarea>
                    </div>
                    <div class="contact__btn-area">
                        <button type="submit" class="contact__btn">Send Message</button>
                    </div>
                </form>

                <div id="contact-thanks" class="contact__thanks">
                    <h3>Thank You!</h3>
                    <p>メッセージは送信されました（※デモ動作です）。<br>内容を確認後、折り返しご連絡いたします。</p>
                    <a href="index.html" class="contact__btn">Topに戻る</a>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer__content">
                <div class="footer__logo">
                    <img src="images/icon_y_2.png" alt="" class="footer__logo-img">
                    <span class="footer__logo-text">Portfolio</span>
                </div>
                <p class="footer__copyright">Copyright &copy; 2026 Yumiko All Rights Reserved.</p>
            </div>
        </div>
    </footer>

    <!--
    JavaScripts
     -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="js/main.js"></script>

</body>
</html>
